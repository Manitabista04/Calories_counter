<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calorie Counter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Navbar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Features</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Pricing</a>
          </li>
          <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true">Disabled</a>
          </li>
        </ul>
         <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
              id="searchInput"

            />
            <button style="border: none;">
              <a id="submitbtn" class="btn btn-outline-dark" type="button" >
                Search
              </a>

                <script>

                  submit= document.getElementById('submitbtn')
                  search= document.getElementById('searchInput')

                  search.addEventListener('change',()=>{
                    submit.href= "/search/" + search.value
                  })

                  
                </script>
              </button>
         
          </form>
      </div>
    </div>
  </nav>
  <div class="container">
    <h2>Log your today food</h2>
    <form action="/" method="POST">
      <div class="mb-3">
        <label for="food" class="form-label">Enter food you had today</label>
        <input type="text" class="form-control" name="food" id="food">
      </div>
      <div class="mb-3">
        <label for="calories" class="form-label">Calories</label>
        <input type="text" class="form-control" name="calories" id="calories">
      </div>
     <button type="submit" class="btn btn-dark mb-2">Submit</button>
    </form>
  </div>
  <div class="container">
    <table class="table" me-2>
      <thead>
        <tr>
          <th scope="col">Sno</th>
          <th scope="col">Food</th>
          <th scope="col">Calories</th>
          <th scope="col">Date</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for food_entry in allfoodEntry  %}
        <tr>
      <th scope="row">{{loop.index}}</th>
      <td>{{food_entry.food}}</td>
      <td>{{food_entry.calories}}</td>
      <td>{{food_entry.date_created}}</td>
      <td>
        <a href="/update/{{food_entry.id}}" type="button" class="btn btn-outline-dark btn-sm mx-1">Update</button>
        <a href="/delete/{{food_entry.id}}" type="button" class="btn btn-outline-dark btn-sm mx-1">Delete</button>
      </td>
    </tr>
    {% endfor %}
      </tbody>
    </table>
  </div>      
</body>

</html>
